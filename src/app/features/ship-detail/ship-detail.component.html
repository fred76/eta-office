@if (shipSvc.$loading()) {
  <div class="flex justify-center py-20">
    <span class="loading loading-spinner loading-lg text-primary"></span>
  </div>
} @else if (shipSvc.$error()) {
  <div class="alert alert-error m-4">{{ shipSvc.$error() }}</div>
} @else {
  <div class="flex flex-col h-full">

    <app-ship-header [ship]="shipSvc.$ship()" />

    <!-- Tab bar -->
    <div class="tabs tabs-bordered bg-base-200 px-6 border-b border-base-300">
      <a class="tab"
         routerLinkActive="tab-active"
         [routerLink]="['rotation']">Rotation</a>
      <a class="tab"
         routerLinkActive="tab-active"
         [routerLink]="['noon']">Noon Report</a>
      <a class="tab"
         routerLinkActive="tab-active"
         [routerLink]="['mooring']">Mooring</a>
      <a class="tab"
         routerLinkActive="tab-active"
         [routerLink]="['sync']">Sync Log</a>
    </div>

    <div class="flex-1 overflow-auto">
      <router-outlet />
    </div>

  </div>
}
